<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Miner: Realm of the Core</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body { background: #0b0f19; color: #fff; overflow: hidden; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* Экраны (Screens) */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0b0f19; z-index: 10; transition: opacity 0.5s ease; }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }

        /* Intro Splash */
        #intro-screen { background: radial-gradient(circle, #1a1f35 0%, #0b0f19 100%); text-align: center; padding: 20px; }
        h1 { font-size: 24px; color: #f39c12; text-shadow: 0 0 15px rgba(243,156,18,0.6); margin-bottom: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .input-box { margin: 15px 0; padding: 12px; width: 80%; max-width: 300px; border-radius: 8px; border: 2px solid #f39c12; background: rgba(0,0,0,0.5); color: #fff; font-size: 16px; text-align: center; }
        .btn { background: linear-gradient(135deg, #f39c12, #d35400); color: #fff; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(243,156,18,0.4); margin-top: 10px; }
        .btn:active { transform: scale(0.95); }

        /* Creator Room */
        #creator-screen { flex-direction: row; padding: 10px; justify-content: space-around; }
        .preview-box { width: 40%; height: 60%; background: #151b2b; border: 2px solid #2c3e50; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .hero-avatar { width: 80px; height: 120px; border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .settings-panel { width: 50%; display: flex; flex-direction: column; gap: 10px; }
        .setting-group label { font-size: 13px; color: #aaa; display: block; margin-bottom: 4px; }
        .options-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .opt-btn { background: #1f293d; border: 1px solid #4b5563; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .opt-btn.active { border-color: #f39c12; background: #374151; }

        /* Main Game Interface */
        #game-screen { justify-content: flex-start; background: #0b0f19; z-index: 5; }
        .top-bar { width: 100%; padding: 10px; background: #111827; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1f293d; }
        .currency { color: #f39c12; font-weight: bold; font-size: 14px; }
        
        /* Arena & Vein */
        .arena { flex: 1; width: 100%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1f293d 0%, #0b0f19 80%); }
        .core-vein { width: 130px; height: 130px; border-radius: 50%; background: radial-gradient(circle, #cd7f32 0%, #5c3a21 100%); border: 4px solid #8b4513; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; text-align: center; box-shadow: 0 0 30px rgba(205,127,50,0.5); cursor: pointer; transition: transform 0.1s; }
        .core-vein:active { transform: scale(0.92); }
        .hp-bar-container { width: 60%; background: #374151; height: 10px; border-radius: 5px; margin-top: 15px; overflow: hidden; border: 1px solid #4b5563; }
        .hp-bar-fill { width: 100%; height: 100%; background: #e74c3c; transition: width 0.2s; }

        /* Party Container (Squad) */
        .party-squad { position: absolute; bottom: 120px; width: 100%; display: flex; justify-content: center; gap: 8px; padding: 0 10px; }
        .party-member { background: rgba(17, 24, 39, 0.85); border: 1px solid #374151; border-radius: 8px; padding: 6px; width: 75px; text-align: center; font-size: 10px; }
        .party-member .avatar-mini { width: 30px; height: 30px; border-radius: 50%; margin: 0 auto 4px auto; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* Controls HUD */
        .controls-hud { position: absolute; bottom: 65px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; align-items: center; }
        .joystick { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; }
        .joystick-knob { width: 30px; height: 30px; border-radius: 50%; background: #f39c12; }
        .attack-btn { width: 75px; height: 75px; border-radius: 50%; background: linear-gradient(135deg, #e74c3c, #c0392b); border: none; color: #fff; font-weight: bold; font-size: 13px; box-shadow: 0 4px 15px rgba(231,76,60,0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .attack-btn:active { transform: scale(0.9); }

        /* Tabs Navigation */
        .tabs-bar { width: 100%; height: 50px; background: #111827; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1f293d; position: absolute; bottom: 0; }
        .tab-item { font-size: 10px; color: #9ca3af; text-align: center; cursor: pointer; flex: 1; }
        .tab-item.active { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 1. INTRO SPLASH SCREEN -->
    <div id="intro-screen" class="screen">
        <h1>GOLD MINER<br><span style="font-size: 16px; color: #fff;">REALM OF THE CORE</span></h1>
        <p style="color: #9ca3af; font-size: 13px; margin-bottom: 20px;">Введите имя вашего героя для начала похода:</p>
        <input type="text" id="hero-name-input" class="input-box" placeholder="Имя героя..." maxlength="12" value="Hero">
        <button class="btn" onclick="startCreation()">Создать героя</button>
    </div>

    <!-- 2. CHARACTER CREATOR (Кастомизация) -->
    <div id="creator-screen" class="screen hidden">
        <div class="preview-box">
            <div id="creator-avatar" class="hero-avatar" style="background-color: #3498db;">
                <span id="preview-helmet-icon">🛡️</span>
            </div>
            <p id="preview-name" style="margin-top: 10px; font-weight: bold; font-size: 14px;">Hero</p>
        </div>
        <div class="settings-panel">
            <h3 style="color: #f39c12; font-size: 15px; margin-bottom: 5px;">Настройка облика</h3>
            
            <div class="setting-group">
                <label>Цвет костюма:</label>
                <div class="options-row">
                    <button class="opt-btn active" onclick="setSkinColor('#3498db', this)">Синий (Маг)</button>
                    <button class="opt-btn" onclick="setSkinColor('#e74c3c', this)">Красный</button>
                    <button class="opt-btn" onclick="setSkinColor('#f1c40f', this)">Золотой</button>
                    <button class="opt-btn" onclick="setSkinColor('#9b59b6', this)">Фиолетовый</button>
                </div>
            </div>

            <div class="setting-group">
                <label>Головной убор:</label>
                <div class="options-row">
                    <button class="opt-btn active" onclick="setHelmet('🛡️ Шлем', this)">Шлем</button>
                    <button class="opt-btn" onclick="setHelmet('🪖 Гребень', this)">Спарта</button>
                    <button class="opt-btn" onclick="setHelmet('🧙 Капюшон', this)">Маг</button>
                    <button class="opt-btn" onclick="setHelmet('👑 Корона', this)">Корона</button>
                </div>
            </div>

            <button class="btn" style="width: 100%; margin-top: 15px;" onclick="enterDungeon()">Войти в данж</button>
        </div>
    </div>

    <!-- 3. MAIN GAME SCREEN -->
    <div id="game-screen" class="screen hidden">
        <div class="top-bar">
            <div>
                <span id="ui-hero-name" style="font-weight: bold; color: #f39c12; font-size: 13px;">Hero</span>
                <div style="font-size: 10px; color: #9ca3af;">Уровень 1 (Медная жила)</div>
            </div>
            <div class="currency">🪙 <span id="gold-count">0</span> G</div>
        </div>

        <div class="arena">
            <div class="core-vein" onclick="hitCore()">
                МЕДНАЯ ЖИЛА<br><span id="hp-text" style="font-size: 10px;">300 / 300</span>
            </div>
            <div class="hp-bar-container">
                <div id="hp-bar" class="hp-bar-fill"></div>
            </div>

            <!-- Отряд компаньонов (Пати) -->
            <div class="party-squad">
                <div class="party-member">
                    <div class="avatar-mini" style="background: #e74c3c;">🛡️</div>
                    <div>Дварф (Танк)</div>
                </div>
                <div class="party-member">
                    <div class="avatar-mini" style="background: #2ecc71;">✨</div>
                    <div>Жрица</div>
                </div>
                <div class="party-member">
                    <div class="avatar-mini" style="background: #9b59b6;">🗡️</div>
                    <div>Рога</div>
                </div>
            </div>

            <!-- Контролы джойстика и атаки -->
            <div class="controls-hud">
                <div class="joystick">
                    <div class="joystick-knob"></div>
                </div>
                <button class="attack-btn" onclick="hitCore()">АТАКА</button>
            </div>
        </div>

        <!-- Нижние вкладки MMORPG -->
        <div class="tabs-bar">
            <div class="tab-item active" onclick="switchTab('mine')">⛏️ Шахта</div>
            <div class="tab-item" onclick="switchTab('customize')">👕 Облик</div>
            <div class="tab-item" onclick="switchTab('heroes')">👥 Герои</div>
            <div class="tab-item" onclick="switchTab('forge')">⚒️ Кузня</div>
            <div class="tab-item" onclick="switchTab('guild')">🛡️ Гильдия</div>
        </div>
    </div>

    <script>
        // Состояние игрока
        let player = {
            name: "Hero",
            color: "#3498db",
            helmet: "🛡️ Шлем",
            gold: 0,
            hp: 300,
            maxHp: 300
        };

        // Проверка сохранения (Умный пропуск для старых игроков)
        window.onload = function() {
            const saved = localStorage.getItem('gold_miner_player');
            if (saved) {
                player = JSON.parse(saved);
                document.getElementById('intro-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                updateUI();
            }
        };

        function startCreation() {
            const nameInput = document.getElementById('hero-name-input').value.trim();
            if (nameInput) player.name = nameInput;
            document.getElementById('preview-name').innerText = player.name;
            
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('creator-screen').classList.remove('hidden');
        }

        function setSkinColor(color, btn) {
            player.color = color;
            document.getElementById('creator-avatar').style.backgroundColor = color;
            updateActiveBtn(btn);
        }

        function setHelmet(helmet, btn) {
            player.helmet = helmet;
            document.getElementById('preview-helmet-icon').innerText = helmet.split(" ")[0];
            updateActiveBtn(btn);
        }

        function updateActiveBtn(activeBtn) {
            let row = activeBtn.parentElement;
            row.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        function enterDungeon() {
            localStorage.setItem('gold_miner_player', JSON.stringify(player));
            document.getElementById('creator-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            updateUI();
        }

        function hitCore() {
            player.gold += 10;
            player.hp -= 25;
            if (player.hp <= 0) {
                player.hp = player.maxHp; // Ресет жилы при расколе
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('gold-count').innerText = player.gold;
            document.getElementById('ui-hero-name').innerText = player.name;
            let pct = (player.hp / player.maxHp) * 100;
            document.getElementById('hp-bar').style.width = pct + '%';
            document.getElementById('hp-text').innerText = player.hp + ' / ' + player.maxHp;
        }

        function switchTab(tabName) {
            if (tabName === 'customize') {
                // Быстрый вызов кастомизатора прямо из игры
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('creator-screen').classList.remove('hidden');
            } else {
                alert("Вкладка '" + tabName + "' открыта!");
            }
        }
    </script>
</body>
</html>
